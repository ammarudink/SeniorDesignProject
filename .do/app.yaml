name: senior-design-project
region: fra

services:
  - name: api
    github:
      repo: ammarudink/SeniorDesignProject
      branch: main
      deploy_on_push: false
    source_dir: backend
    build_command: npm ci && npx prisma generate && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    health_check:
      http_path: /health
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "8080"
      - key: API_PREFIX
        scope: RUN_TIME
        value: /v1
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: info

static_sites:
  - name: web
    github:
      repo: ammarudink/SeniorDesignProject
      branch: main
      deploy_on_push: false
    source_dir: frontend
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        value: /api/v1
    routes:
      - path: /
