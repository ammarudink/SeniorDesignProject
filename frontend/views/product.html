<section class="py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div id="product-loading" class="text-center py-5">
            <div class="spinner-border text-dark mb-3" role="status"></div>
            <p class="mb-0">Loading product...</p>
        </div>

        <div id="product-error" class="text-center py-5 d-none">
            <h2 class="h4 mb-2">Product not found</h2>
            <p class="mb-3" id="product-error-message">The requested product could not be loaded.</p>
            <a class="btn btn-outline-dark" href="#allproducts">Back to products</a>
        </div>

        <div id="product-content" class="row gx-4 gx-lg-5 align-items-center d-none">
            <div class="col-md-6">
                <img class="card-img-top mb-5 mb-md-0" id="product-image" src="frontend/assets/noImage.png" alt="Product Image" onerror="this.src='frontend/assets/noImage.png';" />
            </div>
            <div class="col-md-6">
                <div class="small text-muted mb-2" id="product-category">Category: -</div>
                <h1 class="display-5 fw-bolder" id="product-name">Product Name</h1>
                <div class="fs-5 mb-4" id="product-price">0.00 KM</div>
                <p class="lead" id="product-description">Product description will go here.</p>
                <div class="d-flex align-items-center gap-2" id="product-actions"></div>
            </div>
        </div>
    </div>
</section>
<section class="py-5 bg-light">
    <div class="container px-4 px-lg-5 mt-5">
        <h2 class="fw-bolder mb-4">Related products</h2>
        <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center" id="related-items"></div>
    </div>
</section>
<script>
    setTimeout(function () {
        ProductService.loadProductPageFromHash();
        updateCartCount();
    }, 0);
</script>
